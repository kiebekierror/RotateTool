# ============================
# Android build settings
# ============================

# 強制使用非 Daemon 模式的 AAPT2（proot 必須）
android.enableAapt2=true
android.enableAapt2Daemon=false

# 如果仍然失敗，啟用 legacy AAPT（最後手段）
# android.enableAapt2=false

# ============================
# Gradle settings
# ============================

# 禁用 Gradle Daemon（proot 無法穩定 fork）
org.gradle.daemon=false

# 避免並行編譯（proot 會卡死）
org.gradle.parallel=false

# 避免 configure-on-demand（不穩定）
org.gradle.configureondemand=false

# 減少記憶體使用
org.gradle.jvmargs=-Xmx1024m -XX:+UseSerialGC

# ============================
# Build cache
# ============================

# 禁用 build cache（proot I/O 慢，cache 反而拖慢）
android.enableBuildCache=false
org.gradle.caching=false

